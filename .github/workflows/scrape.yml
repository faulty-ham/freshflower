name: Flower Scraper

on:
  schedule:
    # 9:00 PM Pacific = 04:00 UTC (during PDT, UTC-7)
    # Adjust to 05:00 UTC when PST kicks in (UTC-8) if you want strict 9pm year-round
    - cron: "0 4 * * *"

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Cake House Flower
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run scraper
        working-directory: scripts
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASS:             ${{ secrets.SMTP_PASS }}
          ALERT_TO:              ${{ secrets.ALERT_TO }}
        run: node scrape.js
